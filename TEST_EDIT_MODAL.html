<!DOCTYPE html>
<html>
<head>
    <title>Test Edit Modal</title>
    <style>
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.3s ease-in-out;
            max-width: 500px;
            width: 90%;
        }

        .modal.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-in-out;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Modal Test</h1>
    <button onclick="testModal()">Test Open Modal</button>
    <button onclick="closeTestModal()">Test Close Modal</button>

    <div class="modal" id="testModal">
        <div class="modal-content">
            <h2>Test Modal</h2>
            <p>If you see this, the modal is working!</p>
            <button onclick="closeTestModal()">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="testOverlay" onclick="closeTestModal()"></div>

    <script>
        function testModal() {
            const modal = document.getElementById('testModal');
            const overlay = document.getElementById('testOverlay');
            console.log('Opening modal...');
            console.log('Modal element:', modal);
            console.log('Overlay element:', overlay);
            if (modal && overlay) {
                modal.classList.add('show');
                overlay.classList.add('show');
                console.log('✅ Modal opened -'  + (modal.classList.contains('show') ? 'show class applied' : 'show class NOT applied'));
            }
        }

        function closeTestModal() {
            const modal = document.getElementById('testModal');
            const overlay = document.getElementById('testOverlay');
            if (modal && overlay) {
                modal.classList.remove('show');
                overlay.classList.remove('show');
            }
        }
    </script>
</body>
</html>
